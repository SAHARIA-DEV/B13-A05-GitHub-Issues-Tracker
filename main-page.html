<!DOCTYPE html>
<html>

<head>
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">


    <div class="flex justify-between items-center bg-white p-4 shadow">

        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-8">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2">

            <input id="searchInput" type="text" placeholder="Search issues..." class="border p-2 rounded" />

            <button onclick="searchIssues()" class="bg-purple-600 text-white px-4 py-2 rounded">
                Search
            </button>

        </div>
    </div>


    <div class="max-w-7xl mx-auto mt-6">

        

        <div class="flex gap-2 mb-4">

            <button id="allTab" onclick="loadIssues('all')" class="tab bg-purple-600 text-white px-4 py-2 rounded">
                All
            </button>

            <button id="openTab" onclick="loadIssues('open')" class="tab bg-white border px-4 py-2 rounded">
                Open
            </button>

            <button id="closedTab" onclick="loadIssues('closed')" class="tab bg-white border px-4 py-2 rounded">
                Closed
            </button>

        </div>

        

        <div class="bg-white p-4 rounded shadow mb-4 flex justify-between">

            <div class="flex items-center gap-3">

                <img src="./assets/Aperture.png" class="w-8">

                <div>

                    <h2 class="font-bold text-lg">
                        <span id="issueCount">0</span> Issues
                    </h2>

                    <p class="text-gray-500 text-sm">
                        Track and manage your project issues
                    </p>

                </div>

            </div>

            <div class="flex gap-4 text-sm">

                <div class="flex items-center gap-1">
                    <img src="./assets/Open-Status.png" class="w-4">
                    Open
                </div>

                <div class="flex items-center gap-1">
                    <img src="./assets/Closed-Status .png" class="w-4">
                    Closed
                </div>

            </div>

        </div>


        <div id="spinner" class="text-center hidden text-xl">
            Loading...
        </div>


        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        </div>

    </div>


    <div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center">

        <div class="bg-white w-[420px] rounded-lg p-6 shadow-xl">

            <h2 id="modalTitle" class="text-lg font-semibold mb-2"></h2>

            <div class="flex items-center gap-2 text-xs mb-3">

                <span id="modalStatus" class="bg-green-600 text-white px-2 py-0.5 rounded-full">
                    Opened
                </span>

                <span class="text-gray-500">
                    Opened by <span id="modalAuthor"></span>
                </span>

                <span class="text-gray-400">
                    • <span id="modalDate"></span>
                </span>

            </div>


            <div class="flex gap-2 mb-3 text-[10px]">

                <span class="bg-red-100 text-red-500 px-2 py-0.5 rounded">
                    BUG
                </span>

                <span class="bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded">
                    HELP WANTED
                </span>

            </div>


            <p id="modalDesc" class="text-gray-500 text-sm mb-4"></p>


            <div class="flex justify-between text-sm mb-5">

                <div>
                    <p class="text-gray-400 text-xs">Assignee:</p>
                    <p id="modalAssignee" class="font-medium"></p>
                </div>

                <div>
                    <p class="text-gray-400 text-xs">Priority:</p>

                    <span id="modalPriority" class="bg-red-500 text-white px-2 py-0.5 text-xs rounded-full">
                    </span>

                </div>

            </div>


            <div class="flex justify-end">

                <button onclick="closeModal()"
                    class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 text-sm rounded">
                    Close
                </button>

            </div>

        </div>
    </div>


    <script src="script.js"></script>

</body>

</html>
